<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nueva contraseña - Asistente Informes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css?v=4">
</head>
<body style="background:linear-gradient(135deg,#eef2ff,#f0f2f5);min-height:100vh;display:flex;align-items:center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-11 col-sm-8 col-md-6 col-lg-4">
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-4">
            <div class="text-center mb-4">
              <h2 class="fw-bold">🔑 Nueva contraseña</h2>
              <p class="text-muted small">Elegí una nueva contraseña</p>
            </div>
            <form id="resetForm">
              <div class="mb-2">
                <label class="form-label small fw-medium">Nueva contraseña</label>
                <input type="password" id="pw1" class="form-control" required minlength="6">
              </div>
              <div class="mb-3">
                <label class="form-label small fw-medium">Confirmar contraseña</label>
                <input type="password" id="pw2" class="form-control" required minlength="4">
              </div>
              <div id="errorMsg" class="alert alert-danger d-none py-2 small"></div>
              <div id="successMsg" class="alert alert-success d-none py-2 small"></div>
              <button type="submit" class="btn btn-primary w-100 fw-bold" id="btnReset">Guardar</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('resetForm').addEventListener('submit', async e => {
      e.preventDefault();
      const pw1 = document.getElementById('pw1').value;
      const pw2 = document.getElementById('pw2').value;
      const errEl = document.getElementById('errorMsg');
      const okEl = document.getElementById('successMsg');
      errEl.classList.add('d-none');
      okEl.classList.add('d-none');
      if (pw1 !== pw2) {
        errEl.textContent = 'Las contraseñas no coinciden';
        errEl.classList.remove('d-none');
        return;
      }
      const btn = document.getElementById('btnReset');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
      try {
        const r = await fetch('/api/usuario/reset/{{ token }}', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ nueva: pw1 })
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error);
        okEl.innerHTML = 'Contraseña actualizada. <a href="/login">Iniciar sesión</a>';
        okEl.classList.remove('d-none');
        document.getElementById('resetForm').reset();
      } catch (e) {
        errEl.textContent = e.message;
        errEl.classList.remove('d-none');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Guardar';
      }
    });
  </script>
</body>
</html>
