<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Asistente Informes - Registro</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css?v=2">
</head>
<body style="background: linear-gradient(135deg, #eef2ff 0%, #f0f2f5 100%); min-height:100vh; display:flex; align-items:center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-11 col-sm-8 col-md-6 col-lg-4">
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-4">
            <div class="text-center mb-4">
              <h2 class="fw-bold">Crear cuenta</h2>
              <p class="text-muted small">Completá tus datos</p>
            </div>
            <form id="registerForm">
              <div class="mb-2">
                <label class="form-label small fw-medium">Nombre completo</label>
                <input type="text" id="nombre" class="form-control" required>
              </div>
              <div class="mb-2">
                <label class="form-label small fw-medium">Email</label>
                <input type="email" id="email" class="form-control" required autocomplete="email">
              </div>
              <div class="mb-2">
                <label class="form-label small fw-medium">Contraseña</label>
                <input type="password" id="password" class="form-control" required minlength="4" autocomplete="new-password">
              </div>
              <div class="row g-2 mb-3">
                <div class="col-6">
                  <label class="form-label small fw-medium">Sala</label>
                  <select id="sala" class="form-select">
                    <option>3 Años A</option>
                    <option>3 Años B</option>
                    <option>3 Años C</option>
                    <option>4 Años A</option>
                    <option>4 Años B</option>
                    <option>4 Años C</option>
                    <option>5 Años A</option>
                    <option>5 Años B</option>
                    <option>5 Años C</option>
                  </select>
                </div>
                <div class="col-6">
                  <label class="form-label small fw-medium">Turno</label>
                  <select id="turno" class="form-select">
                    <option>Mañana</option>
                    <option selected>Tarde</option>
                  </select>
                </div>
              </div>
              <div id="errorMsg" class="alert alert-danger d-none py-2 small"></div>
              <button type="submit" class="btn btn-success btn-lg w-100 fw-bold">Crear cuenta</button>
            </form>
            <p class="text-center mt-3 small mb-0">
              ¿Ya tenés cuenta? <a href="/login" class="fw-medium">Iniciar sesión</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
