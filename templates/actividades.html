<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Actividades - Asistente Informes</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css?v=4">
</head>
<body>
  <nav class="navbar navbar-expand navbar-dark shadow-sm sticky-top">
    <div class="container-fluid px-3">
      <span class="navbar-brand fw-bold">Actividades</span>
      <div class="navbar-nav ms-auto flex-row gap-1">
        <a class="btn btn-sm btn-outline-light fw-medium" href="/dashboard">Alumnos</a>
        <a class="btn btn-sm btn-outline-light fw-medium" href="/unidades">UD</a>
        <a class="btn btn-sm btn-outline-light fw-medium" href="/config" title="Configuración">⚙️</a>
        <button class="btn btn-sm btn-outline-light fw-medium" onclick="logout()">Salir</button>
      </div>
    </div>
  </nav>

  <div class="container-fluid px-3 py-3" style="max-width:800px">
    <!-- Carga masiva -->
    <div class="card mb-3 p-3">
      <h6 class="fw-bold mb-2">Cargar actividades</h6>
      <div class="mb-2">
        <label class="form-label small text-muted">Pegá las actividades (una por línea). Usá "Nombre | Área" para asignar área.</label>
        <textarea id="bulkActividades" class="form-control" rows="5" placeholder="Armar la figura humana&#10;Clasificar alimentos&#10;Escuchar el cuento"></textarea>
      </div>
      <div class="row g-2 align-items-end">
        <div class="col">
          <label class="form-label small text-muted">Área por defecto</label>
          <select id="bulkArea" class="form-select">
            {% for a in areas %}
            <option>{{ a }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-auto">
          <button class="btn btn-sm btn-primary fw-bold" onclick="guardarActividadesMulti()">+ Cargar todas</button>
        </div>
      </div>
    </div>

    <!-- Filtro por área -->
    <div class="section-header">
      <h6>Actividades de hoy</h6>
      <select id="filtroArea" class="form-select form-select-sm" style="width:auto" onchange="cargarActividades()">
        <option value="">Todas las áreas</option>
        {% for a in areas %}
        <option>{{ a }}</option>
        {% endfor %}
      </select>
    </div>

    <div id="actividadesContainer">
      <div class="text-center py-5 text-muted">Cargando...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => { cargarAreas(); cargarActividades(); });
  </script>
</body>
</html>
