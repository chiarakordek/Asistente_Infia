<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>{{ alumno.nombre }} {{ alumno.apellido }} - Asistente Informes</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css?v=2">
  <style>
    .informe-card .area { font-weight: 700; color: var(--primary); margin-top: 0.75rem; font-size: 0.9rem; }
    .informe-card .faltas { font-weight: 700; margin-top: 1rem; color: var(--text); }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand navbar-dark shadow-sm sticky-top">
    <div class="container-fluid px-3">
      <span class="navbar-brand fw-bold">{{ alumno.apellido }}, {{ alumno.nombre }}</span>
      <div class="navbar-nav ms-auto flex-row gap-2">
        <a class="btn btn-sm btn-outline-light fw-medium" href="/dashboard">Alumnos</a>
        <button class="btn btn-sm btn-outline-light fw-medium" onclick="logout()">Salir</button>
      </div>
    </div>
  </nav>

  <div class="container-fluid px-3 py-3" style="max-width:800px">
    <!-- Informe -->
    <div class="section-header">
      <h6>Informe evaluativo</h6>
      <div class="d-flex gap-2">
        <button class="btn btn-sm btn-primary fw-bold" id="btnGenerar" onclick="generarInforme({{ alumno.id_alumno }})">
          Generar / Regenerar
        </button>
      </div>
    </div>
    <div id="informeContainer">
      <div class="text-center py-4 text-muted">
        <p class="mb-1 fs-4">📄</p>
        <p class="small">Presioná "Generar" para crear el informe automático.</p>
      </div>
    </div>

    <hr class="my-4">
    <div class="section-header">
      <h6>Actividades realizadas</h6>
      <div class="d-flex gap-2 align-items-center" id="obsActions">
        <button class="btn btn-sm btn-outline-danger fw-bold d-none" id="btnEliminarTodo" onclick="eliminarTodas()">Eliminar todo</button>
        <button class="btn btn-sm btn-outline-danger fw-bold d-none" id="btnEliminarSel" onclick="eliminarSeleccionadas()">Eliminar seleccionadas</button>
        <button class="btn btn-sm btn-outline-danger" id="btnSelectMode" onclick="toggleSeleccionObs()">Eliminar</button>
      </div>
    </div>
    <div id="obsContainer">
      <div class="text-center py-5 text-muted">Cargando...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => cargarObsAlumno({{ alumno.id_alumno }}));
  </script>
</body>
</html>
