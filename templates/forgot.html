<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Recuperar contraseña - Asistente Informes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css?v=3">
</head>
<body style="background:linear-gradient(135deg,#eef2ff,#f0f2f5);min-height:100vh;display:flex;align-items:center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-11 col-sm-8 col-md-6 col-lg-4">
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-4">
            <div class="text-center mb-4">
              <h2 class="fw-bold">🔐 Recuperar contraseña</h2>
              <p class="text-muted small">Ingresá tu email para generar un link de recuperación</p>
            </div>
            <form id="forgotForm">
              <div class="mb-3">
                <label class="form-label small fw-medium">Email</label>
                <input type="email" id="email" class="form-control" required>
              </div>
              <div id="errorMsg" class="alert alert-danger d-none py-2 small"></div>
              <div id="successMsg" class="alert alert-success d-none py-2 small"></div>
              <button type="submit" class="btn btn-primary w-100 fw-bold" id="btnSolicitar">Enviar</button>
            </form>
            <p class="text-center mt-3 small mb-0">
              <a href="/login" class="fw-medium">Volver a iniciar sesión</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', async e => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const errEl = document.getElementById('errorMsg');
      const okEl = document.getElementById('successMsg');
      errEl.classList.add('d-none');
      okEl.classList.add('d-none');
      const btn = document.getElementById('btnSolicitar');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
      try {
        const r = await fetch('/api/usuario/reset-solicitar', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ email })
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error);
        if (data.reset_link) {
          okEl.innerHTML = `Link generado: <a href="${data.reset_link}">${data.reset_link}</a>`;
        } else {
          okEl.textContent = data.mensaje || 'Revisá tu correo electrónico.';
        }
        okEl.classList.remove('d-none');
      } catch (e) {
        errEl.textContent = e.message;
        errEl.classList.remove('d-none');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Enviar';
      }
    });
  </script>
</body>
</html>
