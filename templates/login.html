<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Asistente Informes - Iniciar Sesión</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css?v=3">
</head>
<body style="background: linear-gradient(135deg, #eef2ff 0%, #f0f2f5 100%); min-height:100vh; display:flex; align-items:center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-11 col-sm-8 col-md-6 col-lg-4">
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-4">
            <div class="text-center mb-4">
              <div class="fs-1 fw-bold" style="color:var(--primary)">📋</div>
              <h2 class="fw-bold mt-2">Asistente Informes</h2>
              <p class="text-muted small">Iniciar sesión</p>
            </div>
            <form id="loginForm">
              <div class="mb-3">
                <label class="form-label small fw-medium">Email</label>
                <input type="email" id="email" class="form-control form-control-lg" required autocomplete="email">
              </div>
              <div class="mb-3">
                <label class="form-label small fw-medium">Contraseña</label>
                <input type="password" id="password" class="form-control form-control-lg" required autocomplete="current-password">
              </div>
              <div id="errorMsg" class="alert alert-danger d-none py-2 small"></div>
              <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Entrar</button>
            </form>
            <p class="text-center mt-2 small mb-0">
              <a href="/forgot" class="text-muted">¿Olvidaste tu contraseña?</a>
            </p>
            <p class="text-center mt-1 small mb-0">
              ¿No tenés cuenta? <a href="/registro" class="fw-medium">Registrarse</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
