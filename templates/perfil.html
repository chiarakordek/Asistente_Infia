<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Perfil - Asistente Informes</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css?v=4">
</head>
<body>
  <nav class="navbar navbar-expand navbar-dark shadow-sm sticky-top">
    <div class="container-fluid px-3">
      <span class="navbar-brand fw-bold">Mi perfil</span>
      <div class="navbar-nav ms-auto flex-row gap-1">
        <a class="btn btn-sm btn-outline-light fw-medium" href="/dashboard">Volver</a>
      </div>
    </div>
  </nav>

  <div class="container-fluid px-3 py-3" style="max-width:500px">
    <div class="card p-3 mb-3">
      <h6 class="fw-bold mb-3">Datos del docente</h6>
      <form id="formPerfil">
        <div class="mb-2">
          <label class="form-label small">Nombre completo</label>
          <input type="text" id="pfNombre" class="form-control" value="{{ user.nombre }}" required>
        </div>
        <div class="mb-2">
          <label class="form-label small">Email</label>
          <input type="email" class="form-control" value="{{ user.email }}" disabled>
          <small class="text-muted">No se puede cambiar el email</small>
        </div>
        <div class="row g-2 mb-3">
          <div class="col-6">
            <label class="form-label small">Sala</label>
            <select id="pfSala" class="form-select">
              <option {% if user.sala == '3 Años A' %}selected{% endif %}>3 Años A</option>
              <option {% if user.sala == '3 Años B' %}selected{% endif %}>3 Años B</option>
              <option {% if user.sala == '3 Años C' %}selected{% endif %}>3 Años C</option>
              <option {% if user.sala == '4 Años A' %}selected{% endif %}>4 Años A</option>
              <option {% if user.sala == '4 Años B' %}selected{% endif %}>4 Años B</option>
              <option {% if user.sala == '4 Años C' %}selected{% endif %}>4 Años C</option>
              <option {% if user.sala == '5 Años A' %}selected{% endif %}>5 Años A</option>
              <option {% if user.sala == '5 Años B' %}selected{% endif %}>5 Años B</option>
              <option {% if user.sala == '5 Años C' %}selected{% endif %}>5 Años C</option>
            </select>
          </div>
          <div class="col-6">
            <label class="form-label small">Turno</label>
            <select id="pfTurno" class="form-select">
              <option {% if user.turno == 'Mañana' %}selected{% endif %}>Mañana</option>
              <option {% if user.turno == 'Tarde' %}selected{% endif %}>Tarde</option>
            </select>
          </div>
        </div>
        <div id="pfError" class="alert alert-danger d-none py-2 small"></div>
        <div id="pfSuccess" class="alert alert-success d-none py-2 small">Perfil actualizado.</div>
        <button type="submit" class="btn btn-primary w-100 fw-bold" id="btnPfGuardar">Guardar cambios</button>
      </form>
    </div>

    <div class="d-flex gap-2">
      <a class="btn btn-sm btn-outline-secondary" href="/config">Cambiar contraseña</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/app.js"></script>
  <script>
    document.getElementById('formPerfil').addEventListener('submit', async e => {
      e.preventDefault();
      const errEl = document.getElementById('pfError');
      const okEl = document.getElementById('pfSuccess');
      errEl.classList.add('d-none');
      okEl.classList.add('d-none');
      const btn = document.getElementById('btnPfGuardar');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
      try {
        await api('PUT', '/api/usuario/perfil', {
          nombre: document.getElementById('pfNombre').value.trim(),
          sala: document.getElementById('pfSala').value,
          turno: document.getElementById('pfTurno').value,
        });
        okEl.classList.remove('d-none');
        mostrarToast('Perfil actualizado');
      } catch (e) {
        errEl.textContent = e.message;
        errEl.classList.remove('d-none');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Guardar cambios';
      }
    });
  </script>
</body>
</html>
