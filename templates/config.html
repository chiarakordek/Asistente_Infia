<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Configuración - Asistente Informes</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css?v=4">
</head>
<body>
  <nav class="navbar navbar-expand navbar-dark shadow-sm sticky-top">
    <div class="container-fluid px-3">
      <span class="navbar-brand fw-bold">Configuración</span>
      <div class="navbar-nav ms-auto flex-row gap-2">
        <a class="btn btn-sm btn-outline-light fw-medium" href="/dashboard">Volver</a>
      </div>
    </div>
  </nav>

  <div class="container-fluid px-3 py-3" style="max-width:500px">
    <div class="card p-3 mb-3">
      <h6 class="fw-bold mb-3">Cambiar contraseña</h6>
      <form id="formPassword">
        <div class="mb-2">
          <label class="form-label small">Contraseña actual</label>
          <input type="password" id="pwActual" class="form-control" required>
        </div>
        <div class="mb-2">
          <label class="form-label small">Nueva contraseña</label>
          <input type="password" id="pwNueva" class="form-control" required minlength="4">
        </div>
        <div class="mb-3">
          <label class="form-label small">Confirmar nueva contraseña</label>
          <input type="password" id="pwConfirm" class="form-control" required minlength="4">
        </div>
        <div id="pwError" class="alert alert-danger d-none py-2 small"></div>
        <div id="pwSuccess" class="alert alert-success d-none py-2 small">Contraseña actualizada correctamente.</div>
        <button type="submit" class="btn btn-primary w-100 fw-bold" id="btnPwGuardar">Guardar</button>
      </form>
    </div>

    <hr class="my-3">
    <p class="small text-muted text-center mb-0">Asistente Informes v1.0</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/app.js?v=3"></script>
  <script>
    document.getElementById('formPassword').addEventListener('submit', async e => {
      e.preventDefault();
      const actual = document.getElementById('pwActual').value;
      const nueva = document.getElementById('pwNueva').value;
      const confirm = document.getElementById('pwConfirm').value;
      const errEl = document.getElementById('pwError');
      const okEl = document.getElementById('pwSuccess');
      errEl.classList.add('d-none');
      okEl.classList.add('d-none');

      if (nueva !== confirm) {
        errEl.textContent = 'Las contraseñas nuevas no coinciden';
        errEl.classList.remove('d-none');
        return;
      }
      if (nueva.length < 4) {
        errEl.textContent = 'La nueva contraseña debe tener al menos 4 caracteres';
        errEl.classList.remove('d-none');
        return;
      }

      const btn = document.getElementById('btnPwGuardar');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
      try {
        await api('PUT', '/api/usuario/contraseña', { actual, nueva });
        document.getElementById('formPassword').reset();
        okEl.classList.remove('d-none');
        mostrarToast('Contraseña actualizada');
      } catch (e) {
        errEl.textContent = e.message;
        errEl.classList.remove('d-none');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Guardar';
      }
    });
  </script>
</body>
</html>
