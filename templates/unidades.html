<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Unidades Didácticas - Asistente Informes</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css?v=4">
</head>
<body>
  <nav class="navbar navbar-expand navbar-dark shadow-sm sticky-top">
    <div class="container-fluid px-3">
      <span class="navbar-brand fw-bold">Unidades Didácticas</span>
      <div class="navbar-nav ms-auto flex-row gap-1">
        <a class="btn btn-sm btn-outline-light fw-medium" href="/dashboard">Alumnos</a>
        <a class="btn btn-sm btn-outline-light fw-medium" href="/actividades">Act</a>
        <a class="btn btn-sm btn-outline-light fw-medium" href="/config" title="Configuración">⚙️</a>
        <button class="btn btn-sm btn-outline-light fw-medium" onclick="logout()">Salir</button>
      </div>
    </div>
  </nav>

  <div class="container-fluid px-3 py-3" style="max-width:800px">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
      <h5 class="fw-bold mb-0">Mis unidades</h5>
      <button class="btn btn-sm btn-primary fw-bold" onclick="mostrarModalUnidad()">+ Nueva unidad</button>
    </div>

    <div id="unidadesContainer">
      <div class="text-center py-5 text-muted">Cargando...</div>
    </div>
  </div>

  <div class="modal fade" id="modalUnidad" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h6 class="modal-title fw-bold" id="modalUnidadTitle">Nueva unidad</h6>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="formUnidad">
            <div class="mb-2">
              <label class="form-label small fw-medium">Título</label>
              <input type="text" id="uTitulo" class="form-control" placeholder="Ej: La familia" required>
            </div>
            <div class="mb-2">
              <label class="form-label small fw-medium">Contenido / Descripción</label>
              <textarea id="uContenido" class="form-control" rows="4" placeholder="Descripción de la unidad..."></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-sm btn-primary fw-bold" onclick="guardarUnidad()">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', cargarUnidades);
    let editandoUnidadId = null;

    async function cargarUnidades() {
      const c = document.getElementById('unidadesContainer');
      try {
        const unidades = await api('GET', '/api/unidades');
        if (!unidades.length) {
          c.innerHTML = '<div class="text-center py-5 text-muted"><p class="mb-2 fs-4">📚</p><p class="small">No hay unidades didácticas todavía.</p></div>';
          return;
        }
        c.innerHTML = unidades.map(u => `
          <div class="card mb-2 p-3">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <h6 class="fw-bold mb-1">${u.titulo}</h6>
                <p class="small text-muted mb-0">${(u.contenido||'').substring(0,150)}${(u.contenido||'').length>150?'...':''}</p>
                <small class="text-muted">${u.fecha_creacion?u.fecha_creacion.split(' ')[0]:''}</small>
              </div>
              <div class="d-flex gap-1 flex-shrink-0">
                <button class="btn btn-sm btn-outline-secondary" onclick="editarUnidad(${u.id_unidad})">✏️</button>
                <button class="btn btn-sm btn-outline-danger" onclick="eliminarUnidad(${u.id_unidad})">✕</button>
              </div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        c.innerHTML = '<div class="alert alert-danger py-2 small">'+e.message+'</div>';
      }
    }

    function mostrarModalUnidad() {
      editandoUnidadId = null;
      document.getElementById('modalUnidadTitle').textContent = 'Nueva unidad';
      document.getElementById('formUnidad').reset();
      new bootstrap.Modal('#modalUnidad').show();
    }

    async function guardarUnidad() {
      const titulo = document.getElementById('uTitulo').value.trim();
      const contenido = document.getElementById('uContenido').value.trim();
      if (!titulo) return mostrarToast('El título es obligatorio','warning');
      try {
        if (editandoUnidadId) {
          await api('PUT', '/api/unidades/'+editandoUnidadId, { titulo, contenido });
          mostrarToast('Unidad actualizada');
        } else {
          await api('POST', '/api/unidades', { titulo, contenido });
          mostrarToast('Unidad creada');
        }
        bootstrap.Modal.getInstance(document.getElementById('modalUnidad')).hide();
        cargarUnidades();
      } catch (e) { mostrarToast(e.message,'danger'); }
    }

    async function editarUnidad(id) {
      try {
        const unidades = await api('GET', '/api/unidades');
        const u = unidades.find(x => x.id_unidad === id);
        if (!u) return;
        editandoUnidadId = id;
        document.getElementById('modalUnidadTitle').textContent = 'Editar unidad';
        document.getElementById('uTitulo').value = u.titulo;
        document.getElementById('uContenido').value = u.contenido||'';
        new bootstrap.Modal('#modalUnidad').show();
      } catch (e) { mostrarToast(e.message,'danger'); }
    }

    async function eliminarUnidad(id) {
      if (!confirm('¿Eliminar esta unidad?')) return;
      try {
        await api('DELETE', '/api/unidades/'+id);
        mostrarToast('Unidad eliminada');
        cargarUnidades();
      } catch (e) { mostrarToast(e.message,'danger'); }
    }
  </script>
</body>
</html>
