services:
  - type: web
    name: asistente-informes
    env: python
    buildCommand: ""
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: asistente-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: FLASK_DEBUG
        value: "0"

databases:
  - name: asistente-db
    databaseName: informes
    plan: free
