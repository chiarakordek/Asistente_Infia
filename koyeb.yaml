name: asistente-informes
services:
  - name: web
    type: web
    instance_count: 1
    instance_type: free
    ports:
      - port: 8000
    scalings:
      - min: 1
        max: 1
    routes:
      - path: /
        port: 8000
    env:
      - key: DATABASE_URL
        secret: DATABASE_URL
      - key: SECRET_KEY
        secret: SECRET_KEY
      - key: GROQ_API_KEY
        secret: GROQ_API_KEY
      - key: FLASK_DEBUG
        value: "0"
